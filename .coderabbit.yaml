language: en-US

reviews:
  profile: assertive
  high_level_summary: true
  request_changes_workflow: true
  auto_review:
    enabled: true

  path_filters:
    - "!dist/**"
    - "!*.lock"
    - "!coverage/**"

  path_instructions:
    - path: "packages/kart/**"
      instructions: |
        Effect TS codebase. Uses Context.Tag for services, Layer for DI, ManagedRuntime for lifecycle.
        Plugin architecture: LspPlugin (LSP server config), AstPlugin (parser), PluginRegistry (routing by extension).
        Pure functions in src/pure/ — no IO. Effectful services in src/.
    - path: "packages/varp/**"
      instructions: |
        Manifest-driven project analysis. Zod schemas are source of truth for types (z.infer<>).
        MCP tools accept manifest_path param. Functional core, imperative shell.
    - path: "packages/kiste/**"
      instructions: |
        Git-backed artifact index using Effect TS. SQLite for storage.
    - path: "**/*.test.ts"
      instructions: |
        bun:test runner. Tests should verify behavior, not implementation.
        Prefer fewer meaningful tests over high line counts. No type-checking tests.

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
      - ".claude/rules/*.md"
